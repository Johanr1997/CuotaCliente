body {

.container {

h2 {

    margin-bottom: 8px;

}

p.subtitle {

    margin-bottom: 24px;
    margin-top: 0;
}

.form-group {
    text-align: left;
    margin-bottom: 18px;
}

.form-inline {
    display: flex;
    gap: 12px;
    margin-bottom: 18px;
}

.form-inline .form-group {
    margin-bottom: 0;
    flex: 1;
}

label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #86868b;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    text-align: center;
}

select, input[type="number"] {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #d2d2d7;
    background: #ffffff;
    color: #1d1d1f;
    font-size: 16px;
    font-weight: 400;
    box-sizing: border-box;
    outline: none;
    transition: border-color 0.2s ease;
}

select:focus, input[type="number"]:focus {
    border-color: #0071e3;
}

.checkbox-group {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 10px;
    margin-bottom: 18px;
    padding-left: 4px;
    cursor: pointer;
    user-select: none;
}

.checkbox-group input {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #0071e3;
}

.checkbox-group label {
    display: inline;
    font-size: 14px;
    font-weight: 500;
    color: #1d1d1f;
    text-transform: none;
    letter-spacing: normal;
    cursor: pointer;
}

button {
    background: #0071e3;
    color: #ffffff;
    border: none;
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.2s ease;
}

button:hover {
    background: #0077ed;
}

#capacidad-total {
    margin-top: 20px;
    font-size: 15px;
    color: #6e6e73;
}

#resultados-container {
    margin-top: 20px;
    text-align: left;
    display: none;
}

.tarjeta-recomendacion {
    background: #f5f5f7;
    border: 1px solid #e8e8ed;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
}

.tarjeta-recomendacion h3 {

    font-size: 18px;
    font-weight: 600;
}

.tag-tipo {

    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 12px;

.tag-solo { background: #e3f2fd; color: #0d47a1; }
.tag-combo { background: #e8f5e9; color: #1b5e20; }

    font-weight: 400;

.precio-antes {

    color: #86868b;
    font-size: 13px;
    margin-bottom: 4px;

    font-size: 14px;
    color: #515154;

@media (max-width: 480px) {

function obtenerCostoGarex(cat, precio, opcion) {
    if(opcion === "ninguno") return 0;
    let llave = (cat === "iPhone") ? "iPhone" : "Otros";
    let configuracion = dbGarex[llave].find(g => g.mesesAdic == opcion);
    if(!configuracion) return 0;
    
    let rango = configuracion.rangos.find(r => precio <= r.hasta);
    return rango ? rango.costo : configuracion.rangos[configuracion.rangos.length - 1].costo;
}

function obtenerCostoSeguro(cat, precio, opcion) {
    if(opcion === "ninguno" || !dbSeguros[cat]) return 0;
    let [tipo, meses] = opcion.split("-");
    meses = parseInt(meses);

    let configuracion = dbSeguros[cat].find(s => s.tipo === tipo && s.meses === meses);
    if(!configuracion) return 0;

    let rango = configuracion.rangos.find(r => precio <= r.hasta);
    return rango ? rango.c : configuracion.rangos[configuracion.rangos.length - 1].c;
}

function recomendar() {
    let filtroCategoria = document.getElementById("filtro-categoria").value;
    let cuota = parseFloat(document.getElementById("cuota").value);
    let meses = parseInt(document.getElementById("meses").value);
    let soloDispositivo = document.getElementById("solo-dispositivo").checked;
    
    let garexSel = document.getElementById("garex-opcion").value;
    let seguroSel = document.getElementById("seguro-opcion").value;
    
    if (!cuota || !meses) return;

    let capacityTotal = cuota * meses;
    let formatoUSD = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });

    document.getElementById("capacidad-total").innerHTML = 
        `Capacidad total de compra: <b>${formatoUSD.format(capacityTotal)}</b> a ${meses} meses.`;

    let contenedor = document.getElementById("resultados-container");
    contenedor.innerHTML = "";
    contenedor.style.display = "block";

    let opcionesEncontradas = [];

    productos.forEach(prod => {
        if (filtroCategoria !== "todos" && prod.categoria !== filtroCategoria) return;

        let descuento = descuentosActivos[prod.nombre] || 0;
        let precioFinalEquipo = prod.precio - descuento;

        let costoGarex = obtenerCostoGarex(prod.categoria, precioFinalEquipo, garexSel);
        let costoSeguro = obtenerCostoSeguro(prod.categoria, precioFinalEquipo, seguroSel);
        let subtotalConAgregados = precioFinalEquipo + costoGarex + costoSeguro;

        if (subtotalConAgregados <= capacityTotal + 15) {
            
            if (soloDispositivo || subtotalConAgregados >= capacityTotal * 0.95) {
                opcionesEncontradas.push({
                    tipo: "solo",
                    producto: prod,
                    precioRegular: prod.precio,
                    precioEquipo: precioFinalEquipo,
                    descuento: descuento,
                    costoGarex: costoGarex,
                    costoSeguro: costoSeguro,
                    total: subtotalConAgregados,
                    cuotaReal: subtotalConAgregados / meses,
                    detalles: []
                });
            } else {
                let dineroParaAccesorios = capacityTotal - subtotalConAgregados;
                let comboAccesorios = armarComboAccesorios(prod.categoria, dineroParaAccesorios);
                let totalCombo = subtotalConAgregados + comboAccesorios.totalAccesorios;

                opcionesEncontradas.push({
                    tipo: "combo",
                    producto: prod,
                    precioRegular: prod.precio,
                    precioEquipo: precioFinalEquipo,
                    descuento: descuento,
                    costoGarex: costoGarex,
                    costoSeguro: costoSeguro,
                    total: totalCombo,
                    cuotaReal: totalCombo / meses,
                    detalles: comboAccesorios.lista
                });
            }
        }
    });

    opcionesEncontradas.sort((a, b) => b.total - a.total);

    if (opcionesEncontradas.length === 0) {
        contenedor.innerHTML = "<p style='color:#ff3b30; text-align:center;'>No se encontraron opciones que coincidan con los agregados y presupuesto indicados.</p>";
        return;
    }

    opcionesEncontradas.forEach(opc => {
        let textoDescuentoTag = opc.descuento > 0 ? `<span class="tag-descuento">-$${opc.descuento} PROMO</span>` : '';
        let htmlAntesPrecio = opc.descuento > 0 ? `<div class="precio-antes">Regular: ${formatoUSD.format(opc.precioRegular)}</div>` : '';

        let htmlTarjeta = `
            <div class="tarjeta-recomendacion">
                <span class="tag-tipo ${opc.tipo === 'solo' ? 'tag-solo' : 'tag-combo'}">
                    ${opc.tipo === 'solo' ? 'EQUIPO + SERVICIOS' : 'COMBO COMPLETO'}
                </span>
                ${textoDescuentoTag}
                <h3>${opc.producto.nombre}</h3>
                ${htmlAntesPrecio}
                <div class="precio-principal">
                    ${formatoUSD.format(opc.cuotaReal)} <span>/ mes</span>
                </div>
                <div style="font-size:13px; color:#6e6e73; margin-bottom: 8px;">Monto total financiado: ${formatoUSD.format(opc.total)}</div>
                
                <div class="desglose-combo" style="border-top: 1px solid #e8e8ed; padding-top: 8px;">
                    <strong>Desglose de la cuota:</strong>
                    <div class="item-linea" style="color:#6e6e73;"><span>• Equipo Principal</span> <span>${formatoUSD.format(opc.precioEquipo)}</span></div>
        `;

        if(opc.costoGarex > 0) {
            htmlTarjeta += `<div class="item-linea" style="color:#0071e3;"><span>• Garantía Garex (+${garexSel}m)</span> <span>${formatoUSD.format(opc.costoGarex)}</span></div>`;
        }
        if(opc.costoSeguro > 0) {
            htmlTarjeta += `<div class="item-linea" style="color:#1b5e20;"><span>• Seguro (${seguroSel.split("-")[0]} - ${seguroSel.split("-")[1]}m)</span> <span>${formatoUSD.format(opc.costoSeguro)}</span></div>`;
        }
        if (opc.tipo === 'combo' && opc.detalles.length > 0) {
            opc.detalles.forEach(acc => {
                htmlTarjeta += `<div class="item-linea"><span>• ${acc.nombre}</span> <span>${formatoUSD.format(acc.precio)}</span></div>`;
            });
        }

        htmlTarjeta += `</div></div>`;
        contenedor.innerHTML += htmlTarjeta;
    });
}

function armarComboAccesorios(categoria, presupuestoMax) {
    let listaBase = accesoriosDB[categoria] || [];
    let listaFinal = [];
    let totalAccesorios = 0;

    // Agrega todos los accesorios que quepan en el presupuesto
    listaBase.forEach(item => {
        if (totalAccesorios + item.precio <= presupuestoMax) {
            listaFinal.push(item);
            totalAccesorios += item.precio;
        }
    });

    // Si sobra suficiente dinero, evalúa meter AirPods
    let faltante = presupuestoMax - totalAccesorios;
    let airPodElegido = null;
    
    // Elige el AirPods de mayor valor que quepa en el restante
    for (let i = opcionesAirPods.length - 1; i >= 0; i--) {
        if (opcionesAirPods[i].precio <= faltante) {
            airPodElegido = opcionesAirPods[i];
            break;
        }
    }

    if (airPodElegido) {
        listaFinal.push(airPodElegido);
        totalAccesorios += airPodElegido.precio;
    }

    return { lista: listaFinal, totalAccesorios: totalAccesorios };
}
